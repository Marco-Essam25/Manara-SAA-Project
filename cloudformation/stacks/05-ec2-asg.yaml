AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Project 1 - EC2 + Auto Scaling Group Stack
  Deploys a Launch Template with SSM-enabled IAM role and user data,
  an Auto Scaling Group across 2 AZs, target tracking and step scaling policies.

Parameters:
  ProjectName:
    Type: String
    Default: project1-webapp

  InstanceType:
    Type: String
    Default: t3.medium
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
      - t3.large
      - m5.large
      - m5.xlarge

  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64
    Description: Amazon Linux 2023 latest AMI from SSM Parameter Store

  MinInstances:
    Type: Number
    Default: 2
    MinValue: 1

  MaxInstances:
    Type: Number
    Default: 8
    MaxValue: 20

  DesiredInstances:
    Type: Number
    Default: 2

  TargetCPUUtilization:
    Type: Number
    Default: 60
    MinValue: 10
    MaxValue: 90
    Description: Target CPU % for target tracking scaling policy

Resources:

  # ─── IAM ROLE FOR EC2 (SSM + CloudWatch) ───────────────────────────────────
  EC2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${ProjectName}-ec2-instance-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
      Policies:
        - PolicyName: AppPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - kms:Decrypt
                Resource: '*'
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeTags
                Resource: '*'
      Tags:
        - Key: Project
          Value: !Ref ProjectName

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${ProjectName}-ec2-instance-profile'
      Roles:
        - !Ref EC2InstanceRole

  # ─── LAUNCH TEMPLATE ────────────────────────────────────────────────────────
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub '${ProjectName}-launch-template'
      LaunchTemplateData:
        ImageId: !Ref AmiId
        InstanceType: !Ref InstanceType
        IamInstanceProfile:
          Arn: !GetAtt EC2InstanceProfile.Arn
        SecurityGroupIds:
          - Fn::ImportValue: !Sub '${ProjectName}-EC2SecurityGroupId'
        MetadataOptions:
          HttpTokens: required
          HttpPutResponseHopLimit: 1
          InstanceMetadataTags: enabled
        Monitoring:
          Enabled: true
        BlockDeviceMappings:
          - DeviceName: /dev/xvda
            Ebs:
              VolumeSize: 20
              VolumeType: gp3
              Encrypted: true
              DeleteOnTermination: true
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -euxo pipefail
            exec > >(tee /var/log/user-data.log | logger -t user-data -s 2>/dev/console) 2>&1

            echo "=== Starting user data script ==="

            # Update system packages
            dnf update -y

            # Install required packages
            dnf install -y \
              amazon-cloudwatch-agent \
              nginx \
              python3 \
              python3-pip \
              jq \
              aws-cli

            # Configure Nginx
            cat > /etc/nginx/conf.d/webapp.conf << 'NGINX'
            server {
                listen 80;
                server_name _;

                location /health {
                    access_log off;
                    return 200 '{"status":"healthy","instance":"${!curl -s http://169.254.169.254/latest/meta-data/instance-id}"}';
                    add_header Content-Type application/json;
                }

                location / {
                    proxy_pass http://127.0.0.1:8080;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_connect_timeout 30s;
                    proxy_read_timeout 60s;
                }
            }
            NGINX

            # Enable and start Nginx
            systemctl enable nginx
            systemctl start nginx

            # Configure CloudWatch Agent
            cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json << 'CWA'
            {
              "agent": {
                "metrics_collection_interval": 60,
                "run_as_user": "root"
              },
              "logs": {
                "logs_collected": {
                  "files": {
                    "collect_list": [
                      {
                        "file_path": "/var/log/nginx/access.log",
                        "log_group_name": "/aws/ec2/${ProjectName}/nginx/access",
                        "log_stream_name": "{instance_id}",
                        "retention_in_days": 30
                      },
                      {
                        "file_path": "/var/log/nginx/error.log",
                        "log_group_name": "/aws/ec2/${ProjectName}/nginx/error",
                        "log_stream_name": "{instance_id}",
                        "retention_in_days": 30
                      },
                      {
                        "file_path": "/var/log/user-data.log",
                        "log_group_name": "/aws/ec2/${ProjectName}/user-data",
                        "log_stream_name": "{instance_id}",
                        "retention_in_days": 7
                      }
                    ]
                  }
                }
              },
              "metrics": {
                "namespace": "${ProjectName}/EC2",
                "metrics_collected": {
                  "cpu": {
                    "measurement": ["cpu_usage_idle", "cpu_usage_user", "cpu_usage_system"],
                    "metrics_collection_interval": 60
                  },
                  "mem": {
                    "measurement": ["mem_used_percent"],
                    "metrics_collection_interval": 60
                  },
                  "disk": {
                    "measurement": ["used_percent"],
                    "metrics_collection_interval": 300,
                    "resources": ["/"]
                  }
                }
              }
            }
            CWA

            /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
              -a fetch-config \
              -m ec2 \
              -s \
              -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json

            echo "=== User data script completed ==="

        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub '${ProjectName}-app-instance'
              - Key: Project
                Value: !Ref ProjectName
          - ResourceType: volume
            Tags:
              - Key: Name
                Value: !Sub '${ProjectName}-app-volume'

  # ─── AUTO SCALING GROUP ─────────────────────────────────────────────────────
  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    UpdatePolicy:
      AutoScalingRollingUpdate:
        MinInstancesInService: 1
        MaxBatchSize: 1
        PauseTime: PT5M
        WaitOnResourceSignals: false
    Properties:
      AutoScalingGroupName: !Sub '${ProjectName}-asg'
      MinSize: !Ref MinInstances
      MaxSize: !Ref MaxInstances
      DesiredCapacity: !Ref DesiredInstances
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - Fn::ImportValue: !Sub '${ProjectName}-PrivateAppSubnet1Id'
        - Fn::ImportValue: !Sub '${ProjectName}-PrivateAppSubnet2Id'
      TargetGroupARNs:
        - Fn::ImportValue: !Sub '${ProjectName}-ALBTargetGroupArn'
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      DefaultCooldown: 300
      MetricsCollection:
        - Granularity: '1Minute'
          Metrics:
            - GroupMinSize
            - GroupMaxSize
            - GroupDesiredCapacity
            - GroupInServiceInstances
            - GroupPendingInstances
            - GroupTerminatingInstances
            - GroupTotalInstances
      TerminationPolicies:
        - OldestLaunchTemplate
        - Default
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-asg-instance'
          PropagateAtLaunch: true
        - Key: Project
          Value: !Ref ProjectName
          PropagateAtLaunch: true

  # ─── TARGET TRACKING SCALING POLICY (CPU) ───────────────────────────────────
  CPUTargetTrackingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyName: !Sub '${ProjectName}-cpu-target-tracking'
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: !Ref TargetCPUUtilization
        ScaleInCooldown: 300
        ScaleOutCooldown: 60
        DisableScaleIn: false

  # ─── TARGET TRACKING SCALING POLICY (ALB Request Count) ────────────────────
  ALBRequestCountTargetTrackingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyName: !Sub '${ProjectName}-alb-request-count-target-tracking'
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        CustomizedMetricSpecification:
          MetricName: RequestCountPerTarget
          Namespace: AWS/ApplicationELB
          Dimensions:
            - Name: TargetGroup
              Value:
                Fn::Select:
                  - 5
                  - Fn::Split:
                      - ':'
                      - Fn::ImportValue: !Sub '${ProjectName}-ALBTargetGroupArn'
          Statistic: Sum
          Unit: Count
        TargetValue: 1000
        ScaleInCooldown: 300
        ScaleOutCooldown: 60

  # ─── STEP SCALING POLICY (Scale Out - emergency) ────────────────────────────
  StepScaleOutPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyName: !Sub '${ProjectName}-step-scale-out'
      PolicyType: StepScaling
      AdjustmentType: ChangeInCapacity
      MetricAggregationType: Average
      EstimatedInstanceWarmup: 120
      StepAdjustments:
        - MetricIntervalLowerBound: 0
          MetricIntervalUpperBound: 20
          ScalingAdjustment: 1
        - MetricIntervalLowerBound: 20
          ScalingAdjustment: 2

  StepScaleInPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyName: !Sub '${ProjectName}-step-scale-in'
      PolicyType: StepScaling
      AdjustmentType: ChangeInCapacity
      MetricAggregationType: Average
      StepAdjustments:
        - MetricIntervalUpperBound: 0
          ScalingAdjustment: -1

  # ─── CLOUDWATCH ALARMS TRIGGERING STEP POLICIES ─────────────────────────────
  HighCPUAlarmForScaleOut:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-asg-high-cpu-scaleout'
      AlarmDescription: Trigger step scale-out when CPU > 80%
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 60
      EvaluationPeriods: 2
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AutoScalingGroup
      AlarmActions:
        - !Ref StepScaleOutPolicy

  LowCPUAlarmForScaleIn:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub '${ProjectName}-asg-low-cpu-scalein'
      AlarmDescription: Trigger step scale-in when CPU < 20%
      MetricName: CPUUtilization
      Namespace: AWS/EC2
      Statistic: Average
      Period: 300
      EvaluationPeriods: 3
      Threshold: 20
      ComparisonOperator: LessThanThreshold
      Dimensions:
        - Name: AutoScalingGroupName
          Value: !Ref AutoScalingGroup
      AlarmActions:
        - !Ref StepScaleInPolicy

  # ─── SCHEDULED SCALING (business hours) ─────────────────────────────────────
  ScheduleScaleUp:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      ScheduledActionName: !Sub '${ProjectName}-scale-up-business-hours'
      MinSize: 2
      MaxSize: 8
      DesiredCapacity: 4
      Recurrence: '0 8 * * MON-FRI'
      TimeZone: UTC

  ScheduleScaleDown:
    Type: AWS::AutoScaling::ScheduledAction
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      ScheduledActionName: !Sub '${ProjectName}-scale-down-off-hours'
      MinSize: 1
      MaxSize: 8
      DesiredCapacity: 2
      Recurrence: '0 20 * * MON-FRI'
      TimeZone: UTC

Outputs:
  AutoScalingGroupName:
    Value: !Ref AutoScalingGroup
    Export:
      Name: !Sub '${ProjectName}-ASGName'

  LaunchTemplateId:
    Value: !Ref LaunchTemplate
    Export:
      Name: !Sub '${ProjectName}-LaunchTemplateId'

  EC2InstanceRoleArn:
    Value: !GetAtt EC2InstanceRole.Arn
    Export:
      Name: !Sub '${ProjectName}-EC2InstanceRoleArn'
