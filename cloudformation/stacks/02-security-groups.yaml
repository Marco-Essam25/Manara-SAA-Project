AWSTemplateFormatVersion: '2010-09-09'
Description: >
  Project 1 - Security Groups Stack
  Creates Security Groups for ALB, EC2 instances, and RDS.

Parameters:
  ProjectName:
    Type: String
    Default: project1-webapp

Resources:

  # ─── ALB SECURITY GROUP ─────────────────────────────────────────────────────
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-alb-sg'
      GroupDescription: Security group for Application Load Balancer
      VpcId:
        Fn::ImportValue: !Sub '${ProjectName}-VPCId'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP from anywhere
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS from anywhere
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIpv6: '::/0'
          Description: Allow HTTP from IPv6
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIpv6: '::/0'
          Description: Allow HTTPS from IPv6
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Allow all outbound traffic
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-alb-sg'
        - Key: Project
          Value: !Ref ProjectName

  # ─── EC2 / APP SECURITY GROUP ───────────────────────────────────────────────
  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-ec2-sg'
      GroupDescription: Security group for EC2 application instances
      VpcId:
        Fn::ImportValue: !Sub '${ProjectName}-VPCId'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
          Description: Allow HTTP only from ALB
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0
          Description: Allow HTTPS outbound for SSM and AWS API calls
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
          Description: Allow HTTP outbound for package updates
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp:
            Fn::ImportValue: !Sub '${ProjectName}-VpcCIDR'
          Description: Allow MySQL outbound to RDS
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          CidrIp:
            Fn::ImportValue: !Sub '${ProjectName}-VpcCIDR'
          Description: Allow PostgreSQL outbound to RDS
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-ec2-sg'
        - Key: Project
          Value: !Ref ProjectName

  # ─── RDS SECURITY GROUP ─────────────────────────────────────────────────────
  RDSSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-rds-sg'
      GroupDescription: Security group for RDS database
      VpcId:
        Fn::ImportValue: !Sub '${ProjectName}-VPCId'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: Allow MySQL from EC2 instances only
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: Allow PostgreSQL from EC2 instances only
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-rds-sg'
        - Key: Project
          Value: !Ref ProjectName

  # ─── VPC ENDPOINTS SECURITY GROUP ──────────────────────────────────────────
  VPCEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub '${ProjectName}-vpce-sg'
      GroupDescription: Security group for VPC Endpoints (SSM, SSMMessages, EC2Messages)
      VpcId:
        Fn::ImportValue: !Sub '${ProjectName}-VPCId'
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref EC2SecurityGroup
          Description: Allow HTTPS from EC2 instances for SSM
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${ProjectName}-vpce-sg'
        - Key: Project
          Value: !Ref ProjectName

  # ─── VPC ENDPOINTS FOR SESSION MANAGER (no NAT needed for SSM) ──────────────
  SSMEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId:
        Fn::ImportValue: !Sub '${ProjectName}-VPCId'
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ssm'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - Fn::ImportValue: !Sub '${ProjectName}-PrivateAppSubnet1Id'
        - Fn::ImportValue: !Sub '${ProjectName}-PrivateAppSubnet2Id'
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  SSMMessagesEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId:
        Fn::ImportValue: !Sub '${ProjectName}-VPCId'
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ssmmessages'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - Fn::ImportValue: !Sub '${ProjectName}-PrivateAppSubnet1Id'
        - Fn::ImportValue: !Sub '${ProjectName}-PrivateAppSubnet2Id'
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

  EC2MessagesEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId:
        Fn::ImportValue: !Sub '${ProjectName}-VPCId'
      ServiceName: !Sub 'com.amazonaws.${AWS::Region}.ec2messages'
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - Fn::ImportValue: !Sub '${ProjectName}-PrivateAppSubnet1Id'
        - Fn::ImportValue: !Sub '${ProjectName}-PrivateAppSubnet2Id'
      SecurityGroupIds:
        - !Ref VPCEndpointSecurityGroup

Outputs:
  ALBSecurityGroupId:
    Value: !Ref ALBSecurityGroup
    Export:
      Name: !Sub '${ProjectName}-ALBSecurityGroupId'

  EC2SecurityGroupId:
    Value: !Ref EC2SecurityGroup
    Export:
      Name: !Sub '${ProjectName}-EC2SecurityGroupId'

  RDSSecurityGroupId:
    Value: !Ref RDSSecurityGroup
    Export:
      Name: !Sub '${ProjectName}-RDSSecurityGroupId'

  VPCEndpointSecurityGroupId:
    Value: !Ref VPCEndpointSecurityGroup
    Export:
      Name: !Sub '${ProjectName}-VPCEndpointSecurityGroupId'
